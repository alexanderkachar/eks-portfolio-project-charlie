apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: express-app
  namespace: {{ .Release.Namespace }}
  annotations:
    # Image Updater watches the ECR repo and commits the new tag to values-override.yaml.
    argocd-image-updater.argoproj.io/image-list: "app={{ required "app.imageRepository is required" .Values.app.imageRepository }}"
    argocd-image-updater.argoproj.io/app.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: git:secret:{{ .Release.Namespace }}/git-creds
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: "helmvalues:{{ .Values.app.chartPath }}/values-override.yaml"
    argocd-image-updater.argoproj.io/app.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/app.helm.image-tag: image.tag
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ required "app.repoURL is required" .Values.app.repoURL | quote }}
    targetRevision: {{ .Values.app.targetRevision | quote }}
    path: {{ .Values.app.chartPath | quote }}
    helm:
      valueFiles:
        {{- range .Values.app.valuesFiles }}
        - {{ . | quote }}
        {{- end }}
      parameters:
        - name: targetGroupBinding.enabled
          value: "true"
        - name: targetGroupBinding.targetGroupArn
          value: {{ required "app.targetGroupArn is required" .Values.app.targetGroupArn | quote }}
        - name: targetGroupBinding.targetType
          value: ip
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.app.namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
